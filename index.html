<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#16a34a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="废品记账">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%2316a34a' width='100' height='100' rx='20'/><text x='50' y='65' text-anchor='middle' font-size='50'>♻️</text></svg>">
  <title>废品记账</title>
  <script>
    // ====== 配置（部署时替换为你的 Supabase 信息） ======
    const SUPABASE_URL = 'https://ojxzxvbjqcuyjqdxkwyp.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_aKMJD2l9YxpNxCnWXQBtxw_OkQ-h0i8';
    // ====== 不要改下面 ======
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--green:#16a34a;--green-light:#dcfce7;--red:#dc2626;--red-light:#fee2e2;--blue:#2563eb;--blue-light:#dbeafe;--orange:#ea580c;--orange-light:#fff7ed;--gray:#6b7280;--bg:#f5f5f4;--card:#fff;--radius:16px}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:#1c1917;min-height:100vh;min-height:100dvh;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
    .app{max-width:480px;margin:0 auto;padding:16px;padding-bottom:100px}
    h1{font-size:22px;font-weight:700;text-align:center;padding:12px 0 8px}
    .subtitle{text-align:center;color:var(--gray);font-size:14px;margin-bottom:16px}

    /* 首页卡片 */
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .card{background:var(--card);border-radius:var(--radius);padding:20px 16px;text-align:center;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:transform .15s;border:2px solid transparent}
    .card:active{transform:scale(.97)}
    .card .icon{font-size:40px;display:block;margin-bottom:8px}
    .card .label{font-size:16px;font-weight:600}
    .card.green{border-color:var(--green-light)}
    .card.orange{border-color:var(--orange-light)}
    .card.red{border-color:var(--red-light)}
    .card.blue{border-color:var(--blue-light)}

    /* 表单页 */
    .page{display:none}
    .page.active{display:block}
    .back-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;cursor:pointer;font-size:16px;color:var(--gray);padding:8px 0}
    .back-bar:active{opacity:.6}
    .form-group{margin-bottom:16px}
    .form-group label{display:block;font-size:14px;font-weight:600;margin-bottom:6px;color:#444}
    .form-group input,.form-group select,.form-group textarea{width:100%;padding:14px 16px;border:2px solid #e5e5e5;border-radius:12px;font-size:17px;font-family:inherit;background:var(--card);-webkit-appearance:none}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--green)}
    .form-group textarea{min-height:80px;resize:vertical}
    .btn{display:block;width:100%;padding:16px;border:none;border-radius:14px;font-size:18px;font-weight:700;cursor:pointer;text-align:center;font-family:inherit}
    .btn:active{opacity:.85}
    .btn-primary{background:var(--green);color:#fff}
    .btn-danger{background:var(--red);color:#fff}
    .btn-outline{background:var(--card);color:var(--green);border:2px solid var(--green)}

    /* 照片 */
    .photo-area{width:100%;height:200px;background:var(--bg);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px dashed #d4d4d4;overflow:hidden;position:relative;margin-bottom:12px}
    .photo-area img{width:100%;height:100%;object-fit:cover}
    .photo-area .placeholder{font-size:48px;opacity:.4}
    .photo-area .retake{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.6);color:#fff;padding:6px 12px;border-radius:20px;font-size:12px}

    /* 类型选择器 */
    .type-selector{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .type-btn{padding:16px;border:2px solid #e5e5e5;border-radius:12px;text-align:center;cursor:pointer;background:var(--card);font-size:16px;font-weight:600}
    .type-btn.selected{border-color:var(--green);background:var(--green-light)}
    .type-btn .type-icon{font-size:28px;display:block;margin-bottom:4px}

    /* 卖废品列表 */
    .sell-list{max-height:60vh;overflow-y:auto}
    .sell-item{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--card);border-radius:12px;margin-bottom:8px;border:2px solid transparent;cursor:pointer;transition:all .15s}
    .sell-item.selected{border-color:var(--green);background:var(--green-light)}
    .sell-item .check{width:24px;height:24px;border-radius:50%;border:2px solid #d4d4d4;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px}
    .sell-item.selected .check{background:var(--green);border-color:var(--green);color:#fff}
    .sell-item .info{flex:1;min-width:0}
    .sell-item .info .desc{font-size:14px;color:var(--gray)}
    .sell-item .info .title{font-size:16px;font-weight:600}

    /* 账本汇总 */
    .summary-month{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:16px}
    .summary-month .arrow{font-size:32px;cursor:pointer;padding:4px 12px;border-radius:8px}
    .summary-month .arrow:active{background:#e5e5e5}
    .summary-month .month-label{font-size:18px;font-weight:700;min-width:100px;text-align:center}
    .summary-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
    .summary-card{background:var(--card);border-radius:var(--radius);padding:16px;text-align:center}
    .summary-card .val{font-size:28px;font-weight:800}
    .summary-card .lbl{font-size:13px;color:var(--gray);margin-top:4px}
    .summary-card.green .val{color:var(--green)}
    .summary-card.red .val{color:var(--red)}
    .summary-card.blue .val{color:var(--blue)}
    .section-title{font-size:16px;font-weight:700;margin:16px 0 8px;padding-left:4px}
    .record-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--card);border-radius:10px;margin-bottom:6px;font-size:14px}
    .record-item .r-icon{font-size:24px;flex-shrink:0}
    .record-item .r-info{flex:1}
    .record-item .r-info .r-desc{color:var(--gray);font-size:12px}
    .record-item .r-amount{font-weight:700;font-size:16px;flex-shrink:0}
    .record-item .r-amount.income{color:var(--green)}
    .record-item .r-amount.expense{color:var(--red)}

    /* Toast */
    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1c1917;color:#fff;padding:12px 24px;border-radius:24px;font-size:15px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
    .toast.show{opacity:1}

    /* Loading */
    .loading{text-align:center;padding:40px;color:var(--gray);font-size:14px}

    /* Camera input */
    #camera-input{display:none}

    /* 空状态 */
    .empty{text-align:center;padding:40px 20px;color:var(--gray)}
    .empty .em{font-size:48px;display:block;margin-bottom:8px}

    /* 快捷按钮组 */
    .quick-actions{display:flex;gap:8px;margin-top:12px}
    .quick-actions .btn{flex:1;padding:12px;font-size:14px;border-radius:10px}
  </style>
</head>
<body>

<div class="app" id="app">
  <!-- ====== 首页 ====== -->
  <div class="page active" id="page-home">
    <h1>♻️ 废品记账</h1>
    <p class="subtitle" id="home-date"></p>
    <div class="grid">
      <div class="card green" onclick="showPage('record')">
        <span class="icon">📸</span>
        <span class="label">记废品</span>
      </div>
      <div class="card orange" onclick="showPage('sell')">
        <span class="icon">💰</span>
        <span class="label">卖废品</span>
      </div>
      <div class="card red" onclick="showPage('expense')">
        <span class="icon">💸</span>
        <span class="label">记支出</span>
      </div>
      <div class="card blue" onclick="showPage('summary')">
        <span class="icon">📊</span>
        <span class="label">看账本</span>
      </div>
    </div>
    <!-- 今日概览 -->
    <div style="margin-top:20px" id="today-preview"></div>
  </div>

  <!-- ====== 记废品 ====== -->
  <div class="page" id="page-record">
    <div class="back-bar" onclick="showPage('home')">← 返回</div>
    <h1>📸 记废品</h1>
    <div class="photo-area" id="photo-area" onclick="document.getElementById('camera-input').click()">
      <span class="placeholder" id="photo-placeholder">📷</span>
      <img id="photo-preview" style="display:none">
      <span class="retake" id="retake-btn" style="display:none" onclick="event.stopPropagation();resetPhoto()">重拍</span>
    </div>
    <input type="file" id="camera-input" accept="image/*" capture="environment" onchange="handlePhoto(event)">
    <div class="form-group">
      <label>废品类型</label>
      <div class="type-selector" id="type-selector">
        <div class="type-btn selected" data-type="纸板" onclick="selectType(this)"><span class="type-icon">📦</span>纸板</div>
        <div class="type-btn" data-type="塑料瓶" onclick="selectType(this)"><span class="type-icon">🧴</span>塑料瓶</div>
        <div class="type-btn" data-type="金属" onclick="selectType(this)"><span class="type-icon">🔩</span>金属</div>
        <div class="type-btn" data-type="其他" onclick="selectType(this)"><span class="type-icon">📦</span>其他</div>
      </div>
    </div>
    <div class="form-group">
      <label>数量</label>
      <input type="number" id="rec-qty" placeholder="例如：3.5" step="0.1" min="0.1">
    </div>
    <div class="form-group">
      <label>单位</label>
      <select id="rec-unit">
        <option value="斤">斤</option>
        <option value="个">个</option>
        <option value="公斤">公斤</option>
      </select>
    </div>
    <div class="form-group">
      <label>备注（选填）</label>
      <textarea id="rec-notes" placeholder="比如：在3号楼捡的"></textarea>
    </div>
    <button class="btn btn-primary" onclick="saveRecord()">✅ 记一笔</button>
  </div>

  <!-- ====== 卖废品 ====== -->
  <div class="page" id="page-sell">
    <div class="back-bar" onclick="showPage('home')">← 返回</div>
    <h1>💰 卖废品</h1>
    <p class="subtitle">勾选这次卖掉的东西</p>
    <div class="sell-list" id="sell-list"><div class="loading">加载中...</div></div>
    <div class="form-group" style="margin-top:12px">
      <label>总共卖了多少钱</label>
      <input type="number" id="sell-amount" placeholder="例如：45.5" step="0.1" min="0.1">
    </div>
    <div class="form-group">
      <label>备注（选填）</label>
      <textarea id="sell-notes" placeholder="比如：卖给老李"></textarea>
    </div>
    <button class="btn btn-primary" onclick="saveSale()">💰 记卖出</button>
  </div>

  <!-- ====== 记支出 ====== -->
  <div class="page" id="page-expense">
    <div class="back-bar" onclick="showPage('home')">← 返回</div>
    <h1>💸 记支出</h1>
    <div class="form-group">
      <label>类别</label>
      <select id="exp-category">
        <option value="买菜">🥬 买菜</option>
        <option value="日用品">🧴 日用品</option>
        <option value="交通">🚌 交通</option>
        <option value="医疗">💊 医疗</option>
        <option value="水电">💡 水电</option>
        <option value="话费">📱 话费</option>
        <option value="其他">📌 其他</option>
      </select>
    </div>
    <div class="form-group">
      <label>金额（元）</label>
      <input type="number" id="exp-amount" placeholder="例如：32.5" step="0.1" min="0.1">
    </div>
    <div class="form-group">
      <label>备注（选填）</label>
      <textarea id="exp-notes" placeholder="比如：超市买的"></textarea>
    </div>
    <button class="btn btn-primary" onclick="saveExpense()">✅ 记一笔</button>
  </div>

  <!-- ====== 看账本 ====== -->
  <div class="page" id="page-summary">
    <div class="back-bar" onclick="showPage('home')">← 返回</div>
    <h1>📊 看账本</h1>
    <div class="summary-month">
      <span class="arrow" onclick="changeMonth(-1)">◀</span>
      <span class="month-label" id="summary-month-label">2026年6月</span>
      <span class="arrow" onclick="changeMonth(1)">▶</span>
    </div>
    <div class="summary-cards">
      <div class="summary-card green">
        <div class="val" id="sum-income">¥0</div>
        <div class="lbl">总收入</div>
      </div>
      <div class="summary-card red">
        <div class="val" id="sum-expense">¥0</div>
        <div class="lbl">总支出</div>
      </div>
      <div class="summary-card blue">
        <div class="val" id="sum-waste">¥0</div>
        <div class="lbl">废品收入</div>
      </div>
      <div class="summary-card" id="sum-balance-card">
        <div class="val" id="sum-balance">¥0</div>
        <div class="lbl">结余</div>
      </div>
    </div>
    <div class="section-title">📋 本月明细</div>
    <div id="summary-details"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ====== Supabase 初始化 ======
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let photoFile = null;
let currentMonth = new Date().toISOString().slice(0,7); // YYYY-MM
let selectedWasteType = '纸板';
let selectedSellItems = new Set();

// ====== Toast ======
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// ====== 页面切换 ======
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(name==='sell') loadUnsold();
  if(name==='summary') loadSummary();
  if(name==='home') loadTodayPreview();
  window.scrollTo(0,0);
}

// ====== 首页日期 ======
(function(){
  const now = new Date();
  const w = ['日','一','二','三','四','五','六'];
  document.getElementById('home-date').textContent =
    `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 星期${w[now.getDay()]}`;
})();

// ====== 今日概览 ======
async function loadTodayPreview(){
  const today = new Date().toISOString().slice(0,10);
  const div = document.getElementById('today-preview');
  const {data:recs} = await sb.from('waste_records').select('*').gte('created_at',today).lt('created_at',today+'T23:59:59');
  const {data:exps} = await sb.from('expenses').select('*').gte('created_at',today).lt('created_at',today+'T23:59:59');
  const {data:sales} = await sb.from('waste_sales').select('*').gte('created_at',today).lt('created_at',today+'T23:59:59');
  if(!recs?.length && !exps?.length && !sales?.length){
    div.innerHTML = '<div class="empty"><span class="em">📝</span>今天还没记账哦</div>';
    return;
  }
  let html = '<div class="section-title">📅 今日记录</div>';
  recs?.forEach(r=>html+=`<div class="record-item"><span class="r-icon">📦</span><div class="r-info"><div>${r.waste_type} ${r.quantity}${r.unit}</div><div class="r-desc">${new Date(r.created_at).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}</div></div></div>`);
  exps?.forEach(e=>html+=`<div class="record-item"><span class="r-icon">💸</span><div class="r-info"><div>${e.category}</div><div class="r-desc">${new Date(e.created_at).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}</div></div><div class="r-amount expense">-¥${e.amount}</div></div>`);
  sales?.forEach(s=>html+=`<div class="record-item"><span class="r-icon">💰</span><div class="r-info"><div>卖废品</div><div class="r-desc">${new Date(s.created_at).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}</div></div><div class="r-amount income">+¥${s.total_amount}</div></div>`);
  div.innerHTML = html;
}

// ====== 拍照 ======
function handlePhoto(e){
  const file = e.target.files[0];
  if(!file) return;
  photoFile = file;
  const reader = new FileReader();
  reader.onload = function(ev){
    document.getElementById('photo-preview').src = ev.target.result;
    document.getElementById('photo-preview').style.display = 'block';
    document.getElementById('photo-placeholder').style.display = 'none';
    document.getElementById('retake-btn').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function resetPhoto(){
  photoFile = null;
  document.getElementById('photo-preview').style.display = 'none';
  document.getElementById('photo-placeholder').style.display = 'block';
  document.getElementById('retake-btn').style.display = 'none';
  document.getElementById('camera-input').value = '';
}

// ====== 类型选择 ======
function selectType(btn){
  document.querySelectorAll('#type-selector .type-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedWasteType = btn.dataset.type;
}

// ====== 保存废品记录 ======
async function saveRecord(){
  const qty = parseFloat(document.getElementById('rec-qty').value);
  if(!qty || qty<=0) return toast('请输入数量');
  const unit = document.getElementById('rec-unit').value;
  const notes = document.getElementById('rec-notes').value;

  let photoUrl = '';
  if(photoFile){
    const ext = photoFile.name.split('.').pop();
    const fname = `waste_${Date.now()}.${ext}`;
    const {error:upErr} = await sb.storage.from('waste-photos').upload(fname, photoFile);
    if(!upErr){
      const {data:urlData} = sb.storage.from('waste-photos').getPublicUrl(fname);
      photoUrl = urlData?.publicUrl || '';
    }
  }

  const {error} = await sb.from('waste_records').insert({
    waste_type: selectedWasteType,
    quantity: qty,
    unit: unit,
    photo_url: photoUrl,
    notes: notes
  });

  if(error){ toast('保存失败: '+error.message); return; }
  toast('✅ 记好了！');
  resetPhoto();
  document.getElementById('rec-qty').value = '';
  document.getElementById('rec-notes').value = '';
  loadTodayPreview();
}

// ====== 加载未卖废品 ======
async function loadUnsold(){
  const {data,error} = await sb.from('waste_records').select('*').eq('sold',false).order('created_at',{ascending:false});
  const div = document.getElementById('sell-list');
  if(error){ div.innerHTML='<div class="loading">加载失败</div>'; return; }
  if(!data?.length){ div.innerHTML='<div class="empty"><span class="em">🎉</span>没有待卖的废品，快去捡一些吧！</div>'; return; }
  selectedSellItems = new Set();
  div.innerHTML = data.map(r=>`
    <div class="sell-item" data-id="${r.id}" onclick="toggleSellItem(this,${r.id})">
      <div class="check">✓</div>
      <div class="info">
        <div class="title">${r.waste_type} ${r.quantity}${r.unit}</div>
        <div class="desc">${new Date(r.created_at).toLocaleDateString('zh-CN')} ${r.notes||''}</div>
      </div>
    </div>
  `).join('');
}

function toggleSellItem(el,id){
  if(selectedSellItems.has(id)){
    selectedSellItems.delete(id);
    el.classList.remove('selected');
  }else{
    selectedSellItems.add(id);
    el.classList.add('selected');
  }
}

// ====== 保存卖出 ======
async function saveSale(){
  if(selectedSellItems.size===0) return toast('请至少勾选一项');
  const amount = parseFloat(document.getElementById('sell-amount').value);
  if(!amount || amount<=0) return toast('请输入卖出金额');
  const notes = document.getElementById('sell-notes').value;

  const {data:sale,error:saleErr} = await sb.from('waste_sales').insert({
    total_amount: amount,
    notes: notes
  }).select('id').single();

  if(saleErr){ toast('保存失败: '+saleErr.message); return; }

  const ids = Array.from(selectedSellItems);
  const {error:updErr} = await sb.from('waste_records')
    .update({sold:true, sale_id: sale.id})
    .in('id', ids);

  if(updErr){ toast('更新失败: '+updErr.message); return; }

  toast(`💰 卖出记录成功！`);
  document.getElementById('sell-amount').value = '';
  document.getElementById('sell-notes').value = '';
  loadUnsold();
  loadTodayPreview();
}

// ====== 保存支出 ======
async function saveExpense(){
  const category = document.getElementById('exp-category').value;
  const amount = parseFloat(document.getElementById('exp-amount').value);
  if(!amount || amount<=0) return toast('请输入金额');
  const notes = document.getElementById('exp-notes').value;

  const {error} = await sb.from('expenses').insert({
    category: category,
    amount: amount,
    notes: notes
  });

  if(error){ toast('保存失败: '+error.message); return; }
  toast('✅ 记好了！');
  document.getElementById('exp-amount').value = '';
  document.getElementById('exp-notes').value = '';
  loadTodayPreview();
}

// ====== 看账本 ======
function changeMonth(delta){
  const [y,m] = currentMonth.split('-').map(Number);
  const d = new Date(y, m-1+delta, 1);
  currentMonth = d.toISOString().slice(0,7);
  loadSummary();
}

async function loadSummary(){
  document.getElementById('summary-month-label').textContent = currentMonth.replace('-','年')+'月';
  const start = currentMonth+'-01';
  const end = currentMonth+'-31';

  const [{data:sales},{data:exps},{data:salary}] = await Promise.all([
    sb.from('waste_sales').select('*').gte('created_at',start).lte('created_at',end).order('created_at',{ascending:false}),
    sb.from('expenses').select('*').gte('created_at',start).lte('created_at',end).order('created_at',{ascending:false}),
    sb.from('salary_records').select('*').eq('month',currentMonth)
  ]);

  const wasteIncome = sales?.reduce((s,r)=>s+Number(r.total_amount),0)||0;
  const totalExpense = exps?.reduce((s,r)=>s+Number(r.amount),0)||0;
  const salaryIncome = salary?.reduce((s,r)=>s+Number(r.amount),0)||0;
  const totalIncome = wasteIncome + salaryIncome;
  const balance = totalIncome - totalExpense;

  document.getElementById('sum-income').textContent = '¥'+totalIncome;
  document.getElementById('sum-expense').textContent = '¥'+totalExpense;
  document.getElementById('sum-waste').textContent = '¥'+wasteIncome;
  document.getElementById('sum-balance').textContent = '¥'+balance;
  const balCard = document.getElementById('sum-balance-card');
  balCard.className = 'summary-card '+(balance>=0?'green':'red');

  let details = '';
  if(salaryIncome>0) details+=`<div class="record-item"><span class="r-icon">💼</span><div class="r-info"><div>工资收入</div></div><div class="r-amount income">+¥${salaryIncome}</div></div>`;
  sales?.forEach(s=>{
    details+=`<div class="record-item"><span class="r-icon">💰</span><div class="r-info"><div>卖废品</div><div class="r-desc">${new Date(s.created_at).toLocaleDateString('zh-CN')} ${s.notes||''}</div></div><div class="r-amount income">+¥${s.total_amount}</div></div>`;
  });
  exps?.forEach(e=>{
    details+=`<div class="record-item"><span class="r-icon">💸</span><div class="r-info"><div>${e.category}</div><div class="r-desc">${new Date(e.created_at).toLocaleDateString('zh-CN')} ${e.notes||''}</div></div><div class="r-amount expense">-¥${e.amount}</div></div>`;
  });
  if(!details) details = '<div class="empty"><span class="em">📭</span>本月暂无记录</div>';
  document.getElementById('summary-details').innerHTML = details;
}

// ====== PWA 注册 ======
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
