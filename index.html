<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--g:#07C160;--gb:#ECF9F1;--w:#FF8C00;--r:#E63946;--bg:#F7F8FA;--c:#fff;--t:#1A1A1A;--s:#999;--b:#E8E8E8;--rds:12px}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--t);min-height:100dvh;-webkit-tap-highlight-color:transparent;user-select:none}
.app{max-width:440px;margin:0 auto;padding:0 16px;padding-bottom:90px;padding-top:env(safe-area-inset-top)}
.page{display:none;padding-top:calc(16px + env(safe-area-inset-top))}
#fm-waste.page.on,#fm-sell.page.on,#fm-expense.page.on{padding-top:0;position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:440px;height:100dvh;z-index:50;background:var(--bg)}
.page.on{display:block}

/* Top */
.top{display:flex;align-items:center;justify-content:space-between;padding:12px 0}
.top .t-date{font-size:13px;color:var(--s);font-weight:500}
.top .t-title{font-size:20px;font-weight:700}

/* Stat cards */
.scards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:8px 0 16px}
.scard{background:var(--c);border-radius:var(--rds);padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.scard .sl{font-size:13px;color:var(--s);margin-bottom:4px}
.scard .sv{font-size:26px;font-weight:800;letter-spacing:-1px}
.scard .sv.g{color:var(--g)}
.scard .sv.r{color:var(--r)}
.scard .sv.w{color:var(--w)}
.scard.wide{grid-column:1/-1;display:flex;align-items:center;gap:12px}
.scard.wide .sw-icon{font-size:32px}
.scard.wide .sw-info{flex:1}

/* Section */
.sec{margin:16px 0}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sec-head .sh-t{font-size:16px;font-weight:700}
.sec-head .sh-m{font-size:13px;color:var(--g);cursor:pointer}

/* Item */
.item{display:flex;align-items:center;padding:12px;background:var(--c);border-radius:16px;margin-bottom:10px;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:all .15s}
.item:active{background:#F5F5F5;transform:scale(.98)}
.item .ii{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.ii.w{background:#ECF9F1}.ii.s{background:#FFF3E8}.ii.e{background:#FFEBEE}.ii.sa{background:#EBF2FA}
.item .it{flex:1;min-width:0}
.item .it .it-t{font-size:16px;font-weight:700;margin-bottom:3px;line-height:1.3}
.item .it .it-d{font-size:12px;color:var(--s);display:flex;align-items:center;gap:6px}
.item .it .it-d .dot{width:3px;height:3px;border-radius:50%;background:#CCC;flex-shrink:0}
.item .ia{font-weight:800;font-size:18px;flex-shrink:0;text-align:right}
.item .ia.p{color:var(--g)}.item .ia.n{color:var(--r)}.item .ia.o{color:var(--w)}

/* Sell btn */
.sell-btn{padding:7px 14px;border-radius:16px;font-size:13px;font-weight:700;color:#fff;background:var(--w);border:none;cursor:pointer;flex-shrink:0;margin-left:4px}
.sell-btn:active{opacity:.8}

/* Tab */
.tab{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:440px;width:100%;height:72px;background:rgba(255,255,255,.95);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:space-around;border-top:1px solid var(--b);padding-bottom:env(safe-area-inset-bottom);z-index:100}
.tab .tb{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:6px 14px;border-radius:10px;transition:all .15s}
.tab .tb .ti{font-size:22px}
.tab .tb .tl{font-size:10px;font-weight:600;color:var(--s)}
.tab .tb.on .tl{color:var(--g)}
.tab .tb.ctr{position:relative;top:-16px}
.tab .tb.ctr .ti{width:50px;height:50px;background:var(--g);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;box-shadow:0 4px 14px rgba(7,193,96,.3)}

/* Modal */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;align-items:flex-end;justify-content:center}
.modal.show{display:flex}
.modal .mc{background:var(--c);border-radius:20px 20px 0 0;padding:calc(8px + env(safe-area-inset-top)) 20px 32px;width:100%;max-width:440px;max-height:75vh;overflow-y:auto;padding-bottom:calc(32px + env(safe-area-inset-bottom))}
.modal .mc .mh{width:36px;height:4px;background:#D8D8D8;border-radius:2px;margin:0 auto 14px}
.modal .mc .mt{font-size:18px;font-weight:700;text-align:center;margin-bottom:14px}

/* Action picker */
.apick{display:flex;flex-direction:column;gap:6px}
.apick .ap{display:flex;align-items:center;gap:12px;padding:14px 12px;border-radius:var(--rds);cursor:pointer;transition:all .1s;font-weight:600;font-size:15px;border:1px solid transparent}
.apick .ap:active{background:var(--bg)}
.apick .ap .api{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.api.w{background:#ECF9F1}.api.sl{background:#FFF3E8}.api.ex{background:#FFEBEE}

/* Form page - unified layout */
.form-page{display:flex;flex-direction:column;height:100dvh}
.form-header{display:flex;align-items:center;padding:calc(12px + env(safe-area-inset-top)) 16px 12px;background:var(--c);flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.04);z-index:10}
.form-back{display:inline-flex;align-items:center;gap:4px;font-size:16px;color:var(--g);cursor:pointer;font-weight:600;padding:4px}
.form-back:active{opacity:.7}
.form-title{font-size:18px;font-weight:800;flex:1;text-align:center;margin-right:36px}
.form-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.form-foot{padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom));background:var(--c);border-top:1px solid var(--b);flex-shrink:0;box-shadow:0 -1px 3px rgba(0,0,0,.04)}

/* Form elements */
.photo{width:100%;height:180px;background:var(--bg);border-radius:var(--rds);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;margin-bottom:16px;overflow:hidden;position:relative;border:2px dashed var(--b)}
.photo img{width:100%;height:100%;object-fit:cover;position:absolute}
.photo .pe{font-size:40px;z-index:1}.photo .pt{font-size:14px;color:var(--s);z-index:1;margin-top:4px}
.photo .pr{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.55);color:#fff;padding:6px 14px;border-radius:16px;font-size:13px;z-index:2}
.chips{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.chip{padding:12px 18px;border-radius:22px;font-size:15px;font-weight:600;cursor:pointer;border:1.5px solid var(--b);background:var(--c);transition:all .15s}
.chip:active{transform:scale(.95)}
.chip.pick{border-color:var(--g);background:var(--gb);color:var(--g)}
.ig{margin-bottom:14px}.ig label{display:block;font-size:13px;font-weight:600;color:#666;margin-bottom:6px}
.ig input,.ig textarea{width:100%;padding:14px;border:1.5px solid var(--b);border-radius:12px;font-size:16px;font-family:inherit;background:var(--c)}
.ig input:focus,.ig textarea:focus{outline:none;border-color:var(--g)}
.ig select{width:100%;min-height:52px;padding:14px 40px 14px 16px;border:1.5px solid var(--b);border-radius:12px;font-size:18px;font-weight:600;font-family:inherit;background:var(--c) url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23999'><path d='M7 10l5 5 5-5z'/></svg>") no-repeat right 12px center;background-size:24px;-webkit-appearance:none;appearance:none;cursor:pointer}

.ir{display:flex;gap:10px}.ir .ig{flex:1}.ir .ig.fix{flex:0 0 100px}
.btn{display:block;width:100%;padding:16px;border:none;border-radius:14px;font-size:18px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.btn:active{opacity:.85;transform:scale(.98)}
.btn.g{background:var(--g);color:#fff}.btn.o{background:var(--w);color:#fff}

/* Sell list */
.sell-scroll{max-height:45vh;overflow-y:auto}
.sc{display:flex;align-items:center;padding:14px;background:var(--c);border-radius:var(--rds);margin-bottom:8px;gap:10px;cursor:pointer;border:1.5px solid transparent}
.sc.sel{border-color:var(--g);background:var(--gb)}
.sc .sd{width:22px;height:22px;border-radius:50%;border:2px solid #CCC;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px}
.sc.sel .sd{background:var(--g);border-color:var(--g);color:#fff}
.sc .si{flex:1}.sc .si .sit{font-size:15px;font-weight:600}
.sc .si .sis{font-size:12px;color:var(--s);margin-top:2px}

/* Sell all bar */
.sab{display:flex;margin:8px 0}
.sab .sabb{flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:700;color:#fff;background:var(--w);border:none;cursor:pointer;text-align:center;font-family:inherit}
.sab .sabb:active{opacity:.85}

/* Sell summary badge */
.sell-summary{display:flex;align-items:center;gap:6px;background:var(--gb);padding:6px 14px;border-radius:20px;font-size:13px;color:var(--g);font-weight:600}
.sell-summary b{font-size:14px}

/* Sell amount row */
.sell-amount-row{display:flex;align-items:center;gap:10px}
.sell-amount-row .sell-amount-input{flex:1;display:flex;align-items:center;background:var(--bg);border-radius:12px;padding:4px 14px;border:1.5px solid var(--b)}
.sell-amount-row .sell-amount-input:focus-within{border-color:var(--g)}
.sell-amount-row .say{font-size:22px;font-weight:700;color:var(--w);margin-right:4px;flex-shrink:0}
.sell-amount-row .sell-amount-input input{flex:1;border:none;background:transparent;padding:14px 4px;font-size:20px;font-weight:700;outline:none;width:100%}
.sell-amount-row .btn{flex-shrink:0;width:auto;padding:15px 28px;font-size:16px;border-radius:12px}
.sell-amount-row .btn:disabled{opacity:.45}

/* Detail */
.detail-img{width:100%;max-height:220px;object-fit:cover;border-radius:10px;margin:10px 0}
.detail-type{font-size:20px;font-weight:800;margin-bottom:4px}
.detail-meta{font-size:13px;color:var(--s);margin-bottom:3px}
.detail-note{font-size:14px;color:#555;margin:8px 0;padding:10px;background:var(--bg);border-radius:10px}
.detail-actions{display:flex;gap:10px;margin-top:14px}
.detail-actions .btn{flex:1;font-size:15px;padding:13px}

/* History summary */
.hsum{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:10px 0;background:var(--gb);border-radius:var(--rds);padding:12px}
.hsum .hi{text-align:center}.hsum .hi .hv{font-size:18px;font-weight:700}.hsum .hi .hl{font-size:11px;color:var(--s);margin-top:2px}
.filter{display:flex;gap:6px;margin:10px 0;overflow-x:auto;padding-bottom:2px}
.filter .fc{padding:7px 14px;border-radius:16px;font-size:13px;font-weight:600;border:1.5px solid var(--b);background:var(--c);cursor:pointer;white-space:nowrap;flex-shrink:0}
.filter .fc.on{background:var(--g);color:#fff;border-color:var(--g)}

/* Month picker */
.mpick{display:flex;align-items:center;justify-content:center;gap:6px;margin:10px 0}
.mpick .ma{width:36px;height:36px;border-radius:50%;background:var(--c);display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.mpick .mm{font-size:17px;font-weight:700;min-width:100px;text-align:center}

/* Insight */
.insight{background:var(--gb);border-radius:var(--rds);padding:14px 16px;margin:12px 0;font-size:14px;color:#444;line-height:1.6}
.insight b{color:var(--t)}

.load-more{padding:20px;text-align:center;font-size:13px;color:var(--s)}.load-more .lm-spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.card-photo{width:72px;height:72px;border-radius:14px;overflow:hidden;flex-shrink:0;background:var(--bg)}
.card-photo img{width:100%;height:100%;object-fit:cover}
.ci-thumb{width:48px;height:48px;border-radius:12px;overflow:hidden;flex-shrink:0;background:var(--bg)}
.ci-thumb img{width:100%;height:100%;object-fit:cover}
.card-badge{padding:4px 12px;border-radius:12px;font-size:12px;font-weight:700;flex-shrink:0}
.card-badge.sold{background:#eee;color:var(--s)}
.empty{padding:50px 20px;text-align:center}.empty .ee{font-size:52px;display:block;margin-bottom:10px}.empty .et{font-size:15px;color:var(--s)}
.toast{position:fixed;top:30px;left:50%;transform:translateX(-50%);background:var(--t);color:#fff;padding:12px 24px;border-radius:20px;font-size:14px;font-weight:600;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
#camera{display:none}
</style>
</head>
<body>

<div class="tb" data-t="hist" onclick="nav('hist')"><span class="ti">📋</span><span class="tl">流水</span></div>
<div class="tb ctr" onclick="openAct()"><span class="ti">＋</span></div>
<div class="tb" data-t="sum" onclick="nav('sum')"><span class="ti">📊</span><span class="tl">账本</span></div>
<div class="tb"><span class="ti">⚙️</span><span class="tl">设置</span></div>
</div>

<script>
const sb=supabase.createClient(SB_URL,SB_KEY);
let pf=null,wtype='纸板',sellSet=new Set(),cM=new Date().toISOString().slice(0,7),filt='all',aW=[],aS=[];

(function(){const d=new Date(),w=['日','一','二','三','四','五','六'];document.getElementById('dnow').textContent=d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日 周'+w[d.getDay()]})();

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600)}

function nav(tab){
  document.querySelectorAll('.tb[data-t]').forEach(b=>b.classList.remove('on'));
  document.querySelector('.tb[data-t="'+tab+'"]')?.classList.add('on');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.getElementById(tab).classList.add('on');
  if(tab==='home'){loadHome(true)}if(tab==='hist')loadHist();if(tab==='sum')loadSum();
  window.scrollTo(0,0);
}
function openAct(){document.getElementById('act-modal').classList.add('show')}
function closeAct(){document.getElementById('act-modal').classList.remove('show')}
function openFm(f){
  closeAct();
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.getElementById('tab-bar').style.display='none';
  document.getElementById('fm-'+f).classList.add('on');
  if(f==='sell'){loadUSell()}else{sellSet=new Set()}
  window.scrollTo(0,0);
}
function goHome(skipReload){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.getElementById('tab-bar').style.display='flex';
  document.getElementById('home').classList.add('on');
  window.scrollTo(0,0);
  if(!skipReload){statsCache=null;loadHome(true)}
}

function gotP(e){const f=e.target.files[0];if(!f)return;pf=f;const r=new FileReader();r.onload=ev=>{document.getElementById('pi').src=ev.target.result;['pi','pr'].forEach(id=>document.getElementById(id).style.display='block');['pe','pt'].forEach(id=>document.getElementById(id).style.display='none')};r.readAsDataURL(f)}
function resetP(){pf=null;['pi','pr'].forEach(id=>document.getElementById(id).style.display='none');['pe','pt'].forEach(id=>document.getElementById(id).style.display='block');document.getElementById('camera').value=''}
function pickC(c){document.querySelectorAll('#chips .chip').forEach(x=>x.classList.remove('pick'));c.classList.add('pick');wtype=c.dataset.t}

async function svW(){
  const q=parseFloat(document.getElementById('rq').value);if(!q||q<=0)return toast('请输入数量');
  const u=document.getElementById('ru').value,n=document.getElementById('rn').value;
  document.getElementById('svW-btn').textContent='提交中...';document.getElementById('svW-btn').disabled=true;
  // Compress photo in background, insert first
  let url='';
  const insertAndGo=async()=>{
    const{error,data}=await sb.from('waste_records').insert({waste_type:wtype,quantity:q,unit:u,photo_url:url,notes:n}).select('id,waste_type,quantity,unit,photo_url,notes,sold,created_at').single();
    if(error){toast('失败');document.getElementById('svW-btn').textContent='✅ 记一笔';document.getElementById('svW-btn').disabled=false;return}
    toast('✅ 记好了！');resetP();['rq','rn'].forEach(id=>document.getElementById(id).value='');
    // Prepend to home page
    const card=renderCard(data);
    const rd=document.getElementById('recent');
    if(rd.children[0]&&rd.children[0].classList.contains('empty'))rd.innerHTML=card;
    else rd.insertAdjacentHTML('afterbegin',card);
    goHome(false);
  };
  if(pf){
    // Compress before upload
    const blob=await compressImage(pf,800,0.7);
    const x=pf.name.split('.').pop(),fn='w_'+Date.now()+'.jpg';
    sb.storage.from('waste-photos').upload(fn,blob).then(async r=>{
      if(!r.error){const{data:d}=sb.storage.from('waste-photos').getPublicUrl(fn);url=d?.publicUrl||''}
    }).finally(()=>{});
    // Don't wait for upload, insert immediately
    insertAndGo();
  }else{insertAndGo()}
}

async function compressImage(file,maxW,qty){
  return new Promise(resolve=>{
    const img=new Image(),canvas=document.createElement('canvas'),ctx=canvas.getContext('2d');
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>maxW){h=h*maxW/w;w=maxW}
      canvas.width=w;canvas.height=h;
      ctx.drawImage(img,0,0,w,h);
      canvas.toBlob(b=>resolve(b||file),'image/jpeg',qty);
    };
    img.src=URL.createObjectURL(file);
  });
}

async function loadUSell(){
  const{data}=await sb.from('waste_records').select('*').eq('sold',false).order('created_at',{ascending:false});
  const d=document.getElementById('slist');
  // Set today date
  document.getElementById('sd').value=new Date().toISOString().slice(0,10);
  if(!data?.length){d.innerHTML='<div class="empty"><div class="ee">🎉</div><div class="et">没有待卖的废品</div></div>';sellSet=new Set();upSS();return}
  window._sellData=data;
  d.innerHTML=data.map(r=>`<div class="sc${sellSet.has(r.id)?' sel':''}" data-id="${r.id}" onclick="togS(this,${r.id})"><div class="sd">✓</div><div class="si"><div class="sit">${r.waste_type} ${r.quantity}${r.unit}</div><div class="sis">${new Date(r.created_at).toLocaleDateString('zh-CN')} ${r.notes||''}</div></div></div>`).join('');
  upSS();
}
function togS(el,id){if(sellSet.has(id)){sellSet.delete(id);el.classList.remove('sel')}else{sellSet.add(id);el.classList.add('sel')};upSS()}
function upSS(){
  const cnt=sellSet.size;
  const summary=document.getElementById('sell-summary');
  const btn=document.getElementById('sell-btn');
  const sa=document.getElementById('sa');
  if(cnt>0){
    summary.style.display='flex';
    document.getElementById('ss-count').textContent=cnt;
  }else{summary.style.display='none'}
  btn.disabled=!cnt||!sa.value||parseFloat(sa.value)<=0;
  document.getElementById('sell-btn').style.opacity=btn.disabled?'.45':'1';
}
// monitor amount input
document.addEventListener('DOMContentLoaded',()=>{const sa=document.getElementById('sa');if(sa)sa.addEventListener('input',()=>upSS())});

async function svS(){
  if(!sellSet.size)return toast('请勾选卖掉的废品');
  const a=parseFloat(document.getElementById('sa').value);if(!a||a<=0)return toast('请输入金额');
  const n=document.getElementById('sn').value;
  const sd=document.getElementById('sd').value||new Date().toISOString().slice(0,10);
  document.getElementById('sell-btn').textContent='提交中...';document.getElementById('sell-btn').disabled=true;
  const{data:s,error:se}=await sb.from('waste_sales').insert({total_amount:a,notes:n,created_at:sd+'T'+(new Date()).toTimeString().slice(0,8)}).select('id').single();
  if(se){document.getElementById('sell-btn').textContent='💰 记卖出';document.getElementById('sell-btn').disabled=false;return toast('失败')}
  await sb.from('waste_records').update({sold:true,sale_id:s.id}).in('id',Array.from(sellSet));
  toast('💰 卖出成功！');sellSet=new Set();['sa','sn'].forEach(id=>document.getElementById(id).value='');
  goHome(true);
}

async function svE(){
  const a=parseFloat(document.getElementById('ea').value);if(!a||a<=0)return toast('请输入金额');
  const c=document.getElementById('ec').value.replace(/^[^\s]+\s/,''),n=document.getElementById('en').value;
  document.getElementById('svE-btn').textContent='提交中...';document.getElementById('svE-btn').disabled=true;
  const{error}=await sb.from('expenses').insert({category:c,amount:a,notes:n});
  document.getElementById('svE-btn').textContent='✅ 记一笔';document.getElementById('svE-btn').disabled=false;
  if(error)toast('失败');else{toast('✅ 记好了！');['ea','en'].forEach(id=>document.getElementById(id).value='')}
  goHome(true);
}

let homePage=0,homeDone=false,homeLoading=false,statsCache=null,statsDay='';
async function loadHome(reset){
  if(reset){homePage=0;homeDone=false;document.getElementById('recent').innerHTML='';statsCache=null}
  if(homeDone||homeLoading)return;homeLoading=true;
  const now=new Date(),today=now.toISOString().slice(0,10),m=now.toISOString().slice(0,7);
  const dow=now.getDay(),ws=new Date(now);ws.setDate(now.getDate()-(dow===0?6:dow-1));ws.setHours(0,0,0,0);
  const wk=ws.toISOString().slice(0,10);
  // Stats: only fetch on first page
  if(homePage===0){
    let td,wkSell,uc,wi=0,me=0;
    if(statsCache&&statsDay===today){td=statsCache.td;wkSell=statsCache.wkSell;uc=statsCache.uc;wi=statsCache.wi;me=statsCache.me}
    else{
      const[{count:tc},{data:wks},{count:c},{data:sm},{data:em}]=await Promise.all([
        sb.from('waste_records').select('id',{count:'exact',head:true}).gte('created_at',today).lte('created_at',today+'T23:59:59'),
        sb.from('waste_sales').select('total_amount').gte('created_at',wk),
        sb.from('waste_records').select('id',{count:'exact',head:true}).eq('sold',false),
        sb.from('waste_sales').select('total_amount').gte('created_at',m+'-01').lte('created_at',m+'-31'),
        sb.from('expenses').select('amount').gte('created_at',m+'-01').lte('created_at',m+'-31')
      ]);
      td=tc||0;wkSell=wks?.reduce((s,r)=>s+Number(r.total_amount),0)||0;uc=c||0;wi=sm?.reduce((s,r)=>s+Number(r.total_amount),0)||0;me=em?.reduce((s,r)=>s+Number(r.amount),0)||0;
      statsCache={td,wkSell,uc,wi,me};statsDay=today;
    }
    document.getElementById('stats').innerHTML=`
      <div class="scard"><div class="sl">📅 今日记录</div><div class="sv g">${td} 条</div></div>
      <div class="scard"><div class="sl">💰 本周卖出</div><div class="sv w">¥${wkSell}</div></div>
      <div class="scard"><div class="sl">🗑️ 待卖出</div><div class="sv" style="color:var(--t)">${uc} 条</div></div>
      <div class="scard"><div class="sl">💸 本月支出</div><div class="sv r">¥${me}</div></div>
      <div class="scard wide"><div class="sw-icon">📊</div><div class="sw-info"><div class="sl">本月废品收入</div><div class="sv w">¥${wi}</div></div></div>`;
  }
  // Load records
  const{data:rw}=await sb.from('waste_records').select('id,waste_type,quantity,unit,photo_url,notes,sold,created_at').order('created_at',{ascending:false}).range(homePage*10,(homePage+1)*10-1);
  const rd=document.getElementById('recent');
  if(homePage===0&&(!rw||!rw.length)){rd.innerHTML='<div class="empty"><div class="ee">📝</div><div class="et">点 ＋ 开始记账</div></div>';homeDone=true;homeLoading=false;return}
  if(!rw||rw.length<10)homeDone=true;
  const cards=rw.map(r=>renderCard(r));
  rd.insertAdjacentHTML('beforeend',cards.join(''));
  if(!homeDone){rd.insertAdjacentHTML('beforeend','<div class="load-more" id="load-more">上拉加载更多</div>')}
  homePage++;homeLoading=false;
}

function renderCard(r){
  const ph=r.photo_url?`<div class="card-photo"><img src="${r.photo_url}" loading="lazy" onerror="this.parentElement.remove()"></div>`:'';
  return`<div class="item" onclick="showDet(${r.id})">
    ${ph}
    <div class="it">
      <div class="it-t">${r.waste_type} ${r.quantity}${r.unit}</div>
      <div class="it-d"><span>${ta(r.created_at)}</span>${r.notes?`<span class="dot"></span><span>${r.notes}</span>`:''}</div>
    </div>
    ${r.sold?'<span class="card-badge sold">已卖</span>':'<button class="sell-btn" onclick="event.stopPropagation();quickS('+r.id+')">卖</button>'}
  </div>`;
}

// Scroll-based load more
let scrollTicking=false;
function onHomeScroll(){
  if(scrollTicking||homeLoading||homeDone)return;
  scrollTicking=true;
  requestAnimationFrame(()=>{
    const lm=document.getElementById('load-more');
    if(lm){
      const rect=lm.getBoundingClientRect();
      if(rect.top<window.innerHeight+200){loadHome()}
    }
    scrollTicking=false;
  });
}

function setupHomeScroll(){
  const app=document.querySelector('.app');
  if(app){app.removeEventListener('scroll',onHomeScroll);app.addEventListener('scroll',onHomeScroll,{passive:true})}
  window.removeEventListener('scroll',onHomeScroll);window.addEventListener('scroll',onHomeScroll,{passive:true});
}
function ta(t){const d=new Date(t),n=new Date(),diff=n-d;if(diff<6e4)return'刚刚';if(diff<36e5)return Math.floor(diff/6e4)+'分前';if(diff<864e5)return Math.floor(diff/36e5)+'时前';if(diff<1728e5)return'昨天';if(diff<6048e5)return Math.floor(diff/864e5)+'天前';return d.toLocaleDateString('zh-CN')}

async function showDet(id){
  const r=aW.find(x=>x.id===id);if(!r)return;
  let ih='';if(r.photo_url)ih=`<img class="detail-img" src="${r.photo_url}" onerror="this.style.display='none'">`;
  document.getElementById('det-c').innerHTML=`${ih}<div class="detail-type">${r.waste_type} ${r.quantity}${r.unit}</div><div class="detail-meta">📅 ${new Date(r.created_at).toLocaleString('zh-CN')}</div><div class="detail-meta">📌 ${r.sold?'已卖出':'待卖出'}</div>${r.notes?`<div class="detail-note">💬 ${r.notes}</div>`:''}<div class="detail-actions">${!r.sold?`<button class="btn o" onclick="quickS(${r.id});closeDet()">💰 现在卖出</button>`:''}<button class="btn" style="background:#eee;color:#555" onclick="delR(${r.id})">🗑️ 删除</button></div>`;
  document.getElementById('det-modal').classList.add('show');
}
function closeDet(){document.getElementById('det-modal').classList.remove('show')}
function quickS(id){sellSet=new Set([id]);openFm('sell');closeDet();closeAct()}
async function delR(id){if(!confirm('确定删除？'))return;await sb.from('waste_records').delete().eq('id',id);toast('已删除');closeDet();loadHist();goHome()}

async function loadHist(){
  const f=filt,showS=(f==='all'||f==='waste');
  document.getElementById('hsum').style.display=showS?'grid':'none';
  document.getElementById('sab').style.display=f==='waste'?'flex':'none';
  if(f==='sell'){const{data}=await sb.from('waste_sales').select('*').order('created_at',{ascending:false}).limit(50);aS=data||[];upHS([],aS);renderH(aS,'sell');return}
  if(f==='expense'){const{data}=await sb.from('expenses').select('*').order('created_at',{ascending:false}).limit(50);upHS([],[]);renderH(data||[],'expense');return}
  if(f==='salary'){const{data}=await sb.from('salary_records').select('*').order('created_at',{ascending:false}).limit(50);upHS([],[]);renderH(data||[],'salary');return}
  const[{data:w},{data:s},{data:e},{data:sa}]=await Promise.all([
    f==='waste'?sb.from('waste_records').select('*').order('created_at',{ascending:false}).limit(50):sb.from('waste_records').select('*').order('created_at',{ascending:false}).limit(20),
    sb.from('waste_sales').select('*').order('created_at',{ascending:false}).limit(20),
    sb.from('expenses').select('*').order('created_at',{ascending:false}).limit(20),
    sb.from('salary_records').select('*').order('created_at',{ascending:false}).limit(10)
  ]);
  aW=w||[];aS=s||[];
  if(f==='waste'){upHS(aW,aS);renderH(aW,'waste');return}
  upHS(aW,aS);
  const all=[];w?.forEach(r=>all.push({_t:'waste',time:r.created_at,...r}));s?.forEach(r=>all.push({_t:'sell',time:r.created_at,...r}));e?.forEach(r=>all.push({_t:'expense',time:r.created_at,...r}));sa?.forEach(r=>all.push({_t:'salary',time:r.created_at,...r}));
  all.sort((a,b)=>new Date(b.time)-new Date(a.time));renderH(all.slice(0,50));
}
function upHS(w,s){
  const uu=(w||[]).filter(r=>!r.sold),vv=(s||[]).reduce((a,r)=>a+Number(r.total_amount),0);
  document.getElementById('hv-t').textContent=(w||[]).length+(s||[]).length;
  document.getElementById('hv-u').textContent=uu.length;
  document.getElementById('hv-v').textContent='¥'+vv;
  document.getElementById('sab').style.display=uu.length>0?'flex':'none';
}
function renderH(data,ft){
  const d=document.getElementById('hlist');
  if(!data.length){d.innerHTML='<div class="empty"><div class="ee">📭</div><div class="et">暂无记录</div></div>';return}
  d.innerHTML=data.map(r=>{
    const t=ft||r._t;
    if(t==='waste')return`<div class="item" onclick="showDet(${r.id})">${r.photo_url?`<div class="card-photo"><img src="${r.photo_url}" loading="lazy" onerror="this.parentElement.remove()"></div>`:''}<div class="it"><div class="it-t">${r.waste_type} ${r.quantity}${r.unit}</div><div class="it-d"><span>${ta(r.created_at)}</span>${r.notes?`<span class="dot"></span><span>${r.notes}</span>`:''}</div></div>${r.sold?'<span class="card-badge sold">已卖</span>':'<button class="sell-btn" onclick="event.stopPropagation();quickS('+r.id+')">卖</button>'}</div>`;
    if(t==='sell')return`<div class="item"><div class="ii s">💰</div><div class="it"><div class="it-t">卖废品</div><div class="it-d"><span>${ta(r.created_at)}</span>${r.notes?`<span class="dot"></span><span>${r.notes}</span>`:''}</div></div><div class="ia o">+¥${r.total_amount}</div></div>`;
    if(t==='expense')return`<div class="item"><div class="ii e">💸</div><div class="it"><div class="it-t">${r.category}</div><div class="it-d"><span>${ta(r.created_at)}</span>${r.notes?`<span class="dot"></span><span>${r.notes}</span>`:''}</div></div><div class="ia n">-¥${r.amount}</div></div>`;
    if(t==='salary')return`<div class="item"><div class="ii sa">💼</div><div class="it"><div class="it-t">工资 · ${r.month}</div><div class="it-d">${ta(r.created_at)}</div></div><div class="ia p">+¥${r.amount}</div></div>`;
  }).join('')
}
document.querySelectorAll('#flt .fc').forEach(c=>c.onclick=function(){document.querySelectorAll('#flt .fc').forEach(x=>x.classList.remove('on'));this.classList.add('on');filt=this.dataset.f;loadHist()});
function sellAll(){const uu=aW.filter(r=>!r.sold);if(!uu.length)return toast('没有待卖的');sellSet=new Set(uu.map(r=>r.id));openFm('sell')}

function chM(d){const[y,m]=cM.split('-').map(Number);cM=new Date(y,m-1+d,1).toISOString().slice(0,7);loadSum()}
async function loadSum(){
  document.getElementById('smonth').textContent=cM.replace('-','年')+'月';
  const s=cM+'-01',e=cM+'-31';
  const[{data:sl},{data:ex},{data:sa},{data:wa}]=await Promise.all([
    sb.from('waste_sales').select('*').gte('created_at',s).lte('created_at',e).order('created_at',{ascending:false}),
    sb.from('expenses').select('*').gte('created_at',s).lte('created_at',e).order('created_at',{ascending:false}),
    sb.from('salary_records').select('*').eq('month',cM),
    sb.from('waste_records').select('*').gte('created_at',s).lte('created_at',e).order('created_at',{ascending:false})
  ]);
  const wi=sl?.reduce((a,r)=>a+Number(r.total_amount),0)||0,si=sa?.reduce((a,r)=>a+Number(r.amount),0)||0,me=ex?.reduce((a,r)=>a+Number(r.amount),0)||0,bal=wi+si-me;
  document.getElementById('sstats').innerHTML=`<div class="scard"><div class="sl">总收入</div><div class="sv g">¥${wi+si}</div></div><div class="scard"><div class="sl">总支出</div><div class="sv r">¥${me}</div></div><div class="scard wide"><div class="sw-icon">💰</div><div class="sw-info"><div class="sl">废品收入 ¥${wi} · 工资 ¥${si}</div><div class="sv g">结余 ¥${bal}</div></div></div>`;
  const wt={};wa?.forEach(r=>{wt[r.waste_type]=(wt[r.waste_type]||0)+Number(r.quantity)});
  let tw='',mx=0;for(const[k,v]of Object.entries(wt))if(v>mx){mx=v;tw=k}
  document.getElementById('sinsight').innerHTML=`💡 本月共捡废品 <b>${wa?.length||0}</b> 次${tw?`，捡最多的是 <b>${tw}</b>`:''}。卖废品收入 <b>¥${wi}</b>，${bal>=0?'攒了':'超支了'}<b>¥${Math.abs(bal)}</b>。`;
  let dt='';
  sa?.forEach(s=>dt+=`<div class="item"><div class="ii sa">💼</div><div class="it"><div class="it-t">工资收入</div><div class="it-d">${s.month}</div></div><div class="ia p">+¥${s.amount}</div></div>`);
  sl?.forEach(s=>dt+=`<div class="item"><div class="ii s">💰</div><div class="it"><div class="it-t">卖废品</div><div class="it-d">${new Date(s.created_at).toLocaleDateString('zh-CN')} ${s.notes||''}</div></div><div class="ia o">+¥${s.total_amount}</div></div>`);
  ex?.forEach(e=>dt+=`<div class="item"><div class="ii e">💸</div><div class="it"><div class="it-t">${e.category}</div><div class="it-d">${new Date(e.created_at).toLocaleDateString('zh-CN')} ${e.notes||''}</div></div><div class="ia n">-¥${e.amount}</div></div>`);
  document.getElementById('sdetail').innerHTML=dt||'<div class="empty"><div class="ee">📭</div><div class="et">本月暂无记录</div></div>';
}

setTimeout(()=>{loadHome(true);setupHomeScroll()},100);
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
