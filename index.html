<style>
:root{
  --green:#2E7D32;--green2:#4CAF50;--green3:#66BB6A;--green4:#A5D6A7;
  --orange:#E65100;--orange2:#FF9800;--orange3:#FFB74D;
  --red:#C62828;--red2:#EF5350;
  --blue:#1565C0;
  --bg:#F2F4F3;--card:#FFFFFF;--text:#1B1B1B;--sub:#8E8E93;
  --radius:20px;--shadow:0 2px 12px rgba(0,0,0,.06);
  --tab-height:80px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  background:var(--bg);color:var(--text);min-height:100dvh;
  -webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;
  overflow-x:hidden;
}
.app{max-width:480px;margin:0 auto;padding:0 16px;padding-bottom:calc(var(--tab-height) + 24px)}
.page{display:none;padding-top:12px}
.page.active{display:block}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 0 8px}
.header .greeting{font-size:14px;color:var(--sub)}
.header .title{font-size:24px;font-weight:800;color:var(--text)}
.header .avatar{width:44px;height:44px;border-radius:50%;background:var(--green2);display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff}

/* Stats Row */
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
.stat-card{background:var(--card);border-radius:var(--radius);padding:18px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.stat-card .stat-icon{font-size:32px;margin-bottom:6px}
.stat-card .stat-label{font-size:13px;color:var(--sub);font-weight:500}
.stat-card .stat-val{font-size:26px;font-weight:800;margin:4px 0;letter-spacing:-0.5px}
.stat-card .stat-sub{font-size:12px;color:var(--sub)}
.stat-card::after{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.06}
.stat-card.income::after{background:var(--green2)}
.stat-card.expense::after{background:var(--red2)}
.stat-card.income .stat-val{color:var(--green)}
.stat-card.expense .stat-val{color:var(--red)}
.stat-card.full{grid-column:1/-1;display:flex;align-items:center;gap:14px}
.stat-card.full .waste-emoji{font-size:40px}
.stat-card.full .waste-info{flex:1}
.stat-card.full .waste-info .stat-val{color:var(--orange)}
.stat-card.full .waste-info .stat-sub{font-size:13px}

/* Section */
.section{margin:16px 0}
.section .sec-title{font-size:17px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.section .sec-title .badge{background:var(--green);color:#fff;font-size:11px;padding:2px 8px;border-radius:10px}

/* Record Item */
.r-item{display:flex;align-items:center;padding:14px 16px;background:var(--card);border-radius:14px;margin-bottom:8px;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.03);transition:transform .15s}
.r-item:active{transform:scale(.98)}
.r-item .r-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.r-item .r-icon.waste{background:#E8F5E9}
.r-item .r-icon.sell{background:#FFF3E0}
.r-item .r-icon.expense{background:#FFEBEE}
.r-item .r-icon.salary{background:#E3F2FD}
.r-item .r-info{flex:1;min-width:0}
.r-item .r-info .r-title{font-size:16px;font-weight:600}
.r-item .r-info .r-desc{font-size:12px;color:var(--sub);margin-top:2px}
.r-item .r-amount{font-weight:700;font-size:17px;flex-shrink:0}
.r-item .r-amount.green{color:var(--green)}
.r-item .r-amount.red{color:var(--red)}
.r-item .r-amount.orange{color:var(--orange2)}

/* Tab Bar */
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:480px;width:100%;height:var(--tab-height);background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:space-around;border-top:1px solid rgba(0,0,0,.06);padding:0 16px;padding-bottom:env(safe-area-inset-bottom);z-index:100}
.tab-btn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:8px 16px;border-radius:12px;transition:all .2s;min-width:60px}
.tab-btn .tab-icon{font-size:24px;transition:transform .2s}
.tab-btn .tab-label{font-size:11px;font-weight:600;color:var(--sub)}
.tab-btn.active .tab-label{color:var(--green)}
.tab-btn:active{transform:scale(.9)}
.tab-btn.center{position:relative;top:-20px}
.tab-btn.center .tab-icon{width:56px;height:56px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;box-shadow:0 4px 16px rgba(46,125,50,.35)}

/* Bottom Sheet */
.sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;backdrop-filter:blur(2px)}
.sheet-overlay.show{display:block}
.sheet{display:none;position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:480px;width:100%;background:var(--card);border-radius:24px 24px 0 0;padding:8px 16px 32px;z-index:201;padding-bottom:calc(32px + env(safe-area-inset-bottom))}
.sheet.show{display:block;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translate(-50%,100%)}to{transform:translate(-50%,0)}}
.sheet .sheet-handle{width:36px;height:4px;background:#D1D1D6;border-radius:2px;margin:0 auto 16px}
.sheet .sheet-title{font-size:18px;font-weight:700;text-align:center;margin-bottom:16px}
.sheet .sheet-action{display:flex;align-items:center;gap:14px;padding:16px;border-radius:14px;cursor:pointer;margin-bottom:8px;transition:all .15s;font-size:16px;font-weight:600}
.sheet .sheet-action:active{background:#f5f5f5}
.sheet .sheet-action .sa-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.sheet .sheet-action.record .sa-icon{background:#E8F5E9}
.sheet .sheet-action.sell .sa-icon{background:#FFF3E0}
.sheet .sheet-action.expense .sa-icon{background:#FFEBEE}

/* Form Page */
.form-page{padding-top:8px}
.form-page .fp-back{display:inline-flex;align-items:center;gap:4px;padding:8px 0;cursor:pointer;font-size:15px;color:var(--sub);font-weight:500;margin-bottom:8px}
.form-page .fp-title{font-size:24px;font-weight:800;margin-bottom:20px}

/* Photo */
.photo-btn{width:100%;height:200px;background:linear-gradient(135deg,#E8F5E9,#C8E6C9);border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;margin-bottom:16px;overflow:hidden;position:relative;border:2px dashed var(--green4);transition:all .2s}
.photo-btn:active{opacity:.8}
.photo-btn img{width:100%;height:100%;object-fit:cover;position:absolute}
.photo-btn .photo-text{font-size:40px;margin-bottom:6px;z-index:1}
.photo-btn .photo-label{font-size:15px;color:var(--green);font-weight:600;z-index:1}
.photo-btn .photo-retake{position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,.55);color:#fff;padding:6px 14px;border-radius:20px;font-size:12px;z-index:2;font-weight:600}

/* Type Chips */
.chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.chip{padding:12px 20px;border-radius:24px;font-size:15px;font-weight:600;cursor:pointer;border:2px solid #E0E0E0;background:var(--card);transition:all .15s;white-space:nowrap}
.chip:active{transform:scale(.95)}
.chip.selected{border-color:var(--green2);background:#E8F5E9;color:var(--green)}

/* Input */
.input-group{margin-bottom:16px}
.input-group label{display:block;font-size:14px;font-weight:600;margin-bottom:6px;color:#555}
.input-group input,.input-group select,.input-group textarea{width:100%;padding:14px 16px;border:2px solid #E8E8ED;border-radius:14px;font-size:17px;font-family:inherit;background:var(--card);transition:border .2s;-webkit-appearance:none}
.input-group input:focus,.input-group select:focus,.input-group textarea:focus{outline:none;border-color:var(--green2)}
.input-group textarea{min-height:80px;resize:vertical}
.input-row{display:flex;gap:10px}
.input-row .input-group{flex:1}
.input-row .input-group.fixed{flex:0 0 100px}

/* Button */
.btn{display:block;width:100%;padding:16px;border:none;border-radius:14px;font-size:18px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.btn:active{opacity:.85;transform:scale(.98)}
.btn-primary{background:var(--green);color:#fff}
.btn-orange{background:var(--orange);color:#fff}
.btn-lg{font-size:20px;padding:18px}

/* Sell List */
.sell-header{font-size:15px;color:var(--sub);margin-bottom:10px}
.sell-card{display:flex;align-items:center;padding:14px 16px;background:var(--card);border-radius:14px;margin-bottom:8px;gap:12px;cursor:pointer;border:2px solid transparent;transition:all .15s}
.sell-card.selected{border-color:var(--green2);background:#E8F5E9}
.sell-card .sc-check{width:24px;height:24px;border-radius:50%;border:2px solid #D1D1D6;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s}
.sell-card.selected .sc-check{background:var(--green2);border-color:var(--green2);color:#fff}
.sell-card .sc-info{flex:1}
.sell-card .sc-info .sc-type{font-size:16px;font-weight:600}
.sell-card .sc-info .sc-detail{font-size:12px;color:var(--sub);margin-top:2px}
.sell-scroll{max-height:50vh;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* Summary */
.month-picker{display:flex;align-items:center;justify-content:center;gap:8px;margin:16px 0}
.month-picker .mp-btn{width:40px;height:40px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;box-shadow:var(--shadow);transition:all .15s}
.month-picker .mp-btn:active{transform:scale(.9)}
.month-picker .mp-label{font-size:19px;font-weight:800;min-width:120px;text-align:center}
.insight-box{background:linear-gradient(135deg,#E8F5E9,#F1F8E9);border-radius:var(--radius);padding:20px;margin:16px 0}
.insight-box .ib-title{font-size:15px;font-weight:700;margin-bottom:8px}
.insight-box .ib-text{font-size:14px;color:#555;line-height:1.6}

/* Empty State */
.empty-state{text-align:center;padding:40px 20px}
.empty-state .es-icon{font-size:56px;margin-bottom:12px;display:block}
.empty-state .es-text{font-size:15px;color:var(--sub)}

/* Toast */
.toast{position:fixed;top:40px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:14px 28px;border-radius:24px;font-size:15px;font-weight:600;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* History page */
.history-filter{display:flex;gap:8px;margin:12px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.history-filter .hf-chip{padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;border:1.5px solid #E0E0E0;background:var(--card);cursor:pointer;white-space:nowrap;flex-shrink:0}
.history-filter .hf-chip.active{background:var(--green);color:#fff;border-color:var(--green)}

#camera-input{display:none}
</style>
</head>
<body>

<div class="app" id="app">
  <!-- HOME -->
  <div class="page active" id="page-home">
    <div class="header">
      <div>
        <div class="greeting" id="greeting"></div>
        <div class="title">废品记账</div>
      </div>
      <div class="avatar">👵</div>
    </div>
    <div class="stats-row" id="home-stats"></div>
    <div class="section">
      <div class="sec-title">📋 最近记录 <span class="badge" id="today-badge">今天</span></div>
      <div id="recent-records"></div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="page" id="page-history">
    <div class="header">
      <div><div class="greeting">全部记录</div><div class="title">流水账</div></div>
      <div class="avatar">📋</div>
    </div>
    <div class="history-filter" id="history-filter">
      <div class="hf-chip active" data-filter="all">全部</div>
      <div class="hf-chip" data-filter="waste">📦 废品</div>
      <div class="hf-chip" data-filter="sell">💰 卖出</div>
      <div class="hf-chip" data-filter="expense">💸 支出</div>
      <div class="hf-chip" data-filter="salary">💼 工资</div>
    </div>
    <div id="history-list"></div>
  </div>

  <!-- SUMMARY -->
  <div class="page" id="page-summary">
    <div class="header">
      <div><div class="greeting">月度统计</div><div class="title">看账本</div></div>
      <div class="avatar">📊</div>
    </div>
    <div class="month-picker">
      <div class="mp-btn" onclick="changeMonth(-1)">◀</div>
      <div class="mp-label" id="sum-month">2026年6月</div>
      <div class="mp-btn" onclick="changeMonth(1)">▶</div>

    <div class="insight-box" id="insight-box"></div>
    <div class="section">
      <div class="sec-title">📋 本月明细</div>
      <div id="sum-details"></div>
    </div>
  </div>
</div>

<!-- Bottom Sheet -->
<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">记一笔</div>
  <div class="sheet-action record" onclick="openForm('record')">
    <div class="sa-icon">📸</div>
    <div>记废品<span style="font-size:13px;color:var(--sub);font-weight:400;display:block">拍个照，记斤数</span></div>
  </div>
  <div class="sheet-action sell" onclick="openForm('sell')">
    <div class="sa-icon">💰</div>
    <div>卖废品<span style="font-size:13px;color:var(--sub);font-weight:400;display:block">勾选卖掉的东西</span></div>
  </div>
  <div class="sheet-action expense" onclick="openForm('expense')">
    <div class="sa-icon">💸</div>
    <div>记支出<span style="font-size:13px;color:var(--sub);font-weight:400;display:block">买菜、日常花销</span></div>
  </div>
</div>

<!-- Form: Record Waste -->
<div class="page" id="page-record">
  <div class="form-page">
    <div class="fp-back" onclick="closeForm()">← 返回</div>
    <div class="fp-title">📸 记废品</div>
    <div class="photo-btn" id="photo-btn" onclick="document.getElementById('camera-input').click()">
      <span class="photo-text" id="photo-empty">📷</span>
      <span class="photo-label" id="photo-hint">点击拍照</span>
      <img id="photo-img" style="display:none">
      <span class="photo-retake" id="photo-retake" style="display:none" onclick="event.stopPropagation();resetPhoto()">重拍</span>
    </div>
    <input type="file" id="camera-input" accept="image/*" capture="environment" onchange="handlePhoto(event)">
    <label style="font-size:14px;font-weight:600;color:#555;margin-bottom:6px;display:block">废品类型</label>
    <div class="chip-row" id="type-chips">
      <div class="chip selected" data-type="纸板" onclick="pickType(this)">📦 纸板</div>
      <div class="chip" data-type="塑料瓶" onclick="pickType(this)">🧴 塑料瓶</div>
      <div class="chip" data-type="金属" onclick="pickType(this)">🔩 金属</div>
      <div class="chip" data-type="纸张" onclick="pickType(this)">📄 纸张</div>
      <div class="chip" data-type="其他" onclick="pickType(this)">📦 其他</div>
    </div>
    <div class="input-row">
      <div class="input-group"><label>数量</label><input type="number" id="rec-qty" placeholder="3.5" step="0.1" min="0.1"></div>
      <div class="input-group fixed"><label>单位</label><select id="rec-unit"><option value="斤">斤</option><option value="个">个</option><option value="公斤">公斤</option></select></div>
    </div>
    <div class="input-group"><label>备注（选填）</label><input type="text" id="rec-note" placeholder="在哪捡的..."></div>
    <button class="btn btn-primary btn-lg" onclick="saveWaste()">✅ 记一笔</button>
  </div>
</div>

<!-- Form: Sell -->
<div class="page" id="page-sell">
  <div class="form-page">
    <div class="fp-back" onclick="closeForm()">← 返回</div>
    <div class="fp-title">💰 卖废品</div>
    <div class="sell-header">勾选这次卖掉的废品：</div>
    <div class="sell-scroll" id="sell-list"></div>
    <div class="input-group" style="margin-top:12px"><label>总共卖了多少钱（元）</label><input type="number" id="sell-amount" placeholder="45.5" step="0.1" min="0.1"></div>
    <div class="input-group"><label>备注（选填）</label><input type="text" id="sell-note" placeholder="卖给谁了..."></div>
    <button class="btn btn-orange btn-lg" onclick="saveSell()">💰 记卖出</button>
  </div>
</div>

<!-- Form: Expense -->
<div class="page" id="page-expense">
  <div class="form-page">
    <div class="fp-back" onclick="closeForm()">← 返回</div>
    <div class="fp-title">💸 记支出</div>
    <div class="input-group"><label>类别</label><select id="exp-cat">
      <option>🥬 买菜</option><option>🧴 日用品</option><option>🚌 交通</option><option>💊 医疗</option><option>💡 水电</option><option>📱 话费</option><option>📌 其他</option>
    </select></div>
    <div class="input-group"><label>金额（元）</label><input type="number" id="exp-amount" placeholder="32.5" step="0.1" min="0.1"></div>
    <div class="input-group"><label>备注（选填）</label><input type="text" id="exp-note" placeholder="在哪买的..."></div>
    <button class="btn btn-primary btn-lg" onclick="saveExpense()">✅ 记一笔</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Tab Bar -->
<div class="tab-bar">
  <div class="tab-btn active" data-tab="home" onclick="switchTab('home')">
    <span class="tab-icon">🏠</span><span class="tab-label">首页</span>
  </div>
  <div class="tab-btn" data-tab="history" onclick="switchTab('history')">
    <span class="tab-icon">📋</span><span class="tab-label">流水</span>
  </div>
  <div class="tab-btn center" onclick="openSheet()">
    <span class="tab-icon">＋</span>
  </div>
  <div class="tab-btn" data-tab="summary" onclick="switchTab('summary')">
    <span class="tab-icon">📊</span><span class="tab-label">账本</span>
  </div>
  <div class="tab-btn">
    <span class="tab-icon">👵</span><span class="tab-label">我的</span>
  </div>
</div>

<script>
const sb = supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let photoFile=null, wasteType='纸板', sellSelected=new Set(), curMonth=new Date().toISOString().slice(0,7), historyFilter='all';

// Greeting
(function(){
  const h=new Date().getHours();
  document.getElementById('greeting').textContent=h<12?'早上好 ☀️':h<18?'下午好 🌤️':'晚上好 🌙';
  document.getElementById('today-badge').textContent=`今天 ${new Date().getMonth()+1}/${new Date().getDate()}`;
})();

// Toast
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

// Tab
function switchTab(t){
  document.querySelectorAll('.tab-btn[data-tab]').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.tab-btn[data-tab="${t}"]`)?.classList.add('active');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+t).classList.add('active');
  if(t==='home') loadHome();
  if(t==='history') loadHistory();
  if(t==='summary') loadSummary();
  window.scrollTo(0,0);
}

// Sheet
function openSheet(){document.getElementById('sheet-overlay').classList.add('show');document.getElementById('sheet').classList.add('show')}
function closeSheet(){document.getElementById('sheet-overlay').classList.remove('show');document.getElementById('sheet').classList.remove('show')}

function openForm(f){closeSheet();document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('page-'+f).classList.add('active');if(f==='sell')loadUnsold();window.scrollTo(0,0)}
function closeForm(){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('page-home').classList.add('active');loadHome();window.scrollTo(0,0)}

// Photo
function handlePhoto(e){const f=e.target.files[0];if(!f)return;photoFile=f;const r=new FileReader();r.onload=ev=>{document.getElementById('photo-img').src=ev.target.result;document.getElementById('photo-img').style.display='block';document.getElementById('photo-empty').style.display='none';document.getElementById('photo-hint').style.display='none';document.getElementById('photo-retake').style.display='block'};r.readAsDataURL(f)}
function resetPhoto(){photoFile=null;document.getElementById('photo-img').style.display='none';document.getElementById('photo-empty').style.display='block';document.getElementById('photo-hint').style.display='block';document.getElementById('photo-retake').style.display='none';document.getElementById('camera-input').value=''}
function pickType(b){document.querySelectorAll('#type-chips .chip').forEach(c=>c.classList.remove('selected'));b.classList.add('selected');wasteType=b.dataset.type}

// Save waste
async function saveWaste(){
  const q=parseFloat(document.getElementById('rec-qty').value);if(!q||q<=0)return toast('请输入数量');
  const u=document.getElementById('rec-unit').value,n=document.getElementById('rec-note').value;
  let url='';if(photoFile){const x=photoFile.name.split('.').pop(),fn=`w_${Date.now()}.${x}`;const{error:ue}=await sb.storage.from('waste-photos').upload(fn,photoFile);if(!ue){const{data:d}=sb.storage.from('waste-photos').getPublicUrl(fn);url=d?.publicUrl||''}}
  const{error}=await sb.from('waste_records').insert({waste_type:wasteType,quantity:q,unit:u,photo_url:url,notes:n});
  if(error){toast('失败: '+error.message);return}toast('✅ 废品记好了！');
  resetPhoto();document.getElementById('rec-qty').value='';document.getElementById('rec-note').value='';closeForm()
}

// Unsold
async function loadUnsold(){
  const{data}=await sb.from('waste_records').select('*').eq('sold',false).order('created_at',{ascending:false});
  const d=document.getElementById('sell-list');sellSelected=new Set();
  if(!data?.length){d.innerHTML='<div class="empty-state"><span class="es-icon">🎉</span><div class="es-text">没有待卖的废品，先去捡一些吧！</div></div>';return}
  d.innerHTML=data.map(r=>`<div class="sell-card" data-id="${r.id}" onclick="toggleSell(this,${r.id})"><div class="sc-check">✓</div><div class="sc-info"><div class="sc-type">${r.waste_type} ${r.quantity}${r.unit}</div><div class="sc-detail">${new Date(r.created_at).toLocaleDateString('zh-CN')} ${r.notes||''}</div></div></div>`).join('')
}
function toggleSell(el,id){if(sellSelected.has(id)){sellSelected.delete(id);el.classList.remove('selected')}else{sellSelected.add(id);el.classList.add('selected')}}

// Save sell
async function saveSell(){
  if(!sellSelected.size)return toast('请勾选卖掉的废品');
  const a=parseFloat(document.getElementById('sell-amount').value);if(!a||a<=0)return toast('请输入金额');
  const n=document.getElementById('sell-note').value;
  const{data:s,error:se}=await sb.from('waste_sales').insert({total_amount:a,notes:n}).select('id').single();
  if(se){toast('失败: '+se.message);return}
  await sb.from('waste_records').update({sold:true,sale_id:s.id}).in('id',Array.from(sellSelected));
  toast('💰 卖出成功！');document.getElementById('sell-amount').value='';document.getElementById('sell-note').value='';closeForm()
}

// Save expense
async function saveExpense(){
  const a=parseFloat(document.getElementById('exp-amount').value);if(!a||a<=0)return toast('请输入金额');
  const c=document.getElementById('exp-cat').value,n=document.getElementById('exp-note').value;
  const{error}=await sb.from('expenses').insert({category:c.replace(/^[^\s]+\s/,''),amount:a,notes:n});
  if(error){toast('失败: '+error.message);return}toast('✅ 支出记好了！');
  document.getElementById('exp-amount').value='';document.getElementById('exp-note').value='';closeForm()
}

// Home
async function loadHome(){
  const now=new Date(),today=now.toISOString().slice(0,10),month=now.toISOString().slice(0,7),start=month+'-01',end=month+'-31';
  const[{data:sales},{data:exps},{data:salesM},{data:expsM},{data:wasteM},{data:recent}]=await Promise.all([
    sb.from('waste_sales').select('total_amount').gte('created_at',today).lt('created_at',today+'T23:59:59'),
    sb.from('expenses').select('amount').gte('created_at',today).lt('created_at',today+'T23:59:59'),
    sb.from('waste_sales').select('total_amount').gte('created_at',start).lte('created_at',end),
    sb.from('expenses').select('amount').gte('created_at',start).lte('created_at',end),
    sb.from('waste_records').select('*').eq('sold',false),
    sb.from('waste_records').select('*').or('sold.eq.false,created_at.gte.'+today).order('created_at',{ascending:false}).limit(8)
  ]);
  const tInc=sales?.reduce((s,r)=>s+Number(r.total_amount),0)||0,tExp=exps?.reduce((s,r)=>s+Number(r.amount),0)||0;
  const mInc=salesM?.reduce((s,r)=>s+Number(r.total_amount),0)||0,mExp=expsM?.reduce((s,r)=>s+Number(r.amount),0)||0;
  document.getElementById('home-stats').innerHTML=`
    <div class="stat-card income"><div class="stat-icon">📥</div><div class="stat-label">今日收入</div><div class="stat-val">¥${tInc}</div></div>
    <div class="stat-card expense"><div class="stat-icon">📤</div><div class="stat-label">今日支出</div><div class="stat-val">¥${tExp}</div></div>
    <div class="stat-card full"><div class="waste-emoji">🗑️</div><div class="waste-info"><div class="stat-label">待卖废品 · ${wasteM?.length||0}条</div><div class="stat-val">${wasteM?.length||0}<span style="font-size:16px;font-weight:600"> 条</span></div><div class="stat-sub" style="font-size:13px">本月废品收入 ¥${mInc} · 支出 ¥${mExp}</div></div></div>`;
  const rDiv=document.getElementById('recent-records');
  if(!recent?.length){rDiv.innerHTML='<div class="empty-state"><span class="es-icon">📝</span><div class="es-text">还没有记录，点中间＋开始记账吧</div></div>';return}
  rDiv.innerHTML=recent.map(r=>`<div class="r-item"><div class="r-icon waste">📦</div><div class="r-info"><div class="r-title">${r.waste_type} ${r.quantity}${r.unit}</div><div class="r-desc">${timeAgo(r.created_at)}${r.notes?' · '+r.notes:''}</div></div><div style="font-size:13px;color:var(--sub)">${r.sold?'已卖':'待卖'}</div></div>`).join('')
}

// History
async function loadHistory(){
  let q=sb.from('waste_records').select('*').order('created_at',{ascending:false}).limit(50);
  if(historyFilter==='sell'){
    const{data}=await sb.from('waste_sales').select('*').order('created_at',{ascending:false}).limit(50);
    renderHistory(data||[],'sell');
    return;
  }
  if(historyFilter==='expense'){
    const{data}=await sb.from('expenses').select('*').order('created_at',{ascending:false}).limit(50);
    renderHistory(data||[],'expense');
    return;
  }
  if(historyFilter==='salary'){
    const{data}=await sb.from('salary_records').select('*').order('created_at',{ascending:false}).limit(50);
    renderHistory(data||[],'salary');
    return;
  }
  if(historyFilter==='waste'){
    const{data}=await sb.from('waste_records').select('*').order('created_at',{ascending:false}).limit(50);
    renderHistory(data||[],'waste');
    return;
  }
  const[{data:w},{data:s},{data:e},{data:sa}]=await Promise.all([
    sb.from('waste_records').select('*').order('created_at',{ascending:false}).limit(20),
    sb.from('waste_sales').select('*').order('created_at',{ascending:false}).limit(20),
    sb.from('expenses').select('*').order('created_at',{ascending:false}).limit(20),
    sb.from('salary_records').select('*').order('created_at',{ascending:false}).limit(10)
  ]);
  const all=[];
  w?.forEach(r=>all.push({_type:'waste',time:r.created_at,...r}));
  s?.forEach(r=>all.push({_type:'sell',time:r.created_at,...r}));
  e?.forEach(r=>all.push({_type:'expense',time:r.created_at,...r}));
  sa?.forEach(r=>all.push({_type:'salary',time:r.created_at,...r}));
  all.sort((a,b)=>new Date(b.time)-new Date(a.time));
  renderHistory(all.slice(0,50));
}
function renderHistory(data,forceType){
  const d=document.getElementById('history-list');
  if(!data.length){d.innerHTML='<div class="empty-state"><span class="es-icon">📭</span><div class="es-text">暂无记录</div></div>';return}
  d.innerHTML=data.map(r=>{
    const t=forceType||r._type;
    if(t==='waste')return`<div class="r-item"><div class="r-icon waste">📦</div><div class="r-info"><div class="r-title">${r.waste_type} ${r.quantity}${r.unit}</div><div class="r-desc">${timeAgo(r.created_at)}${r.notes?' · '+r.notes:''}</div></div><span style="font-size:13px;color:var(--sub)">${r.sold?'已卖':'待卖'}</span></div>`;
    if(t==='sell')return`<div class="r-item"><div class="r-icon sell">💰</div><div class="r-info"><div class="r-title">卖废品</div><div class="r-desc">${timeAgo(r.created_at)}${r.notes?' · '+r.notes:''}</div></div><div class="r-amount orange">+¥${r.total_amount}</div></div>`;
    if(t==='expense')return`<div class="r-item"><div class="r-icon expense">💸</div><div class="r-info"><div class="r-title">${r.category}</div><div class="r-desc">${timeAgo(r.created_at)}${r.notes?' · '+r.notes:''}</div></div><div class="r-amount red">-¥${r.amount}</div></div>`;
    if(t==='salary')return`<div class="r-item"><div class="r-icon salary">💼</div><div class="r-info"><div class="r-title">工资 · ${r.month}</div><div class="r-desc">${timeAgo(r.created_at)}</div></div><div class="r-amount green">+¥${r.amount}</div></div>`;
  }).join('')
}
function timeAgo(t){const d=new Date(t),now=new Date(),diff=now-d;if(diff<6e4)return'刚刚';if(diff<36e5)return Math.floor(diff/6e4)+'分钟前';if(diff<864e5)return Math.floor(diff/36e5)+'小时前';if(diff<1728e5)return'昨天';if(diff<6048e5)return Math.floor(diff/864e5)+'天前';return d.toLocaleDateString('zh-CN')}
document.querySelectorAll('#history-filter .hf-chip').forEach(c=>c.onclick=function(){document.querySelectorAll('#history-filter .hf-chip').forEach(x=>x.classList.remove('active'));this.classList.add('active');historyFilter=this.dataset.filter;loadHistory()});

// Summary
function changeMonth(d){const[y,m]=curMonth.split('-').map(Number);const dt=new Date(y,m-1+d,1);curMonth=dt.toISOString().slice(0,7);loadSummary()}
async function loadSummary(){
  document.getElementById('sum-month').textContent=curMonth.replace('-','年')+'月';
  const start=curMonth+'-01',end=curMonth+'-31';
  const[{data:sales},{data:exps},{data:salary},{data:waste}]=await Promise.all([
    sb.from('waste_sales').select('*').gte('created_at',start).lte('created_at',end).order('created_at',{ascending:false}),
    sb.from('expenses').select('*').gte('created_at',start).lte('created_at',end).order('created_at',{ascending:false}),
    sb.from('salary_records').select('*').eq('month',curMonth),
    sb.from('waste_records').select('*').gte('created_at',start).lte('created_at',end).order('created_at',{ascending:false})
  ]);
  const wInc=sales?.reduce((s,r)=>s+Number(r.total_amount),0)||0,mExp=exps?.reduce((s,r)=>s+Number(r.amount),0)||0,sInc=salary?.reduce((s,r)=>s+Number(r.amount),0)||0,total=wInc+sInc,bal=total-mExp;
  const wasteTypes={};waste?.forEach(r=>{const k=r.waste_type;wasteTypes[k]=(wasteTypes[k]||0)+Number(r.quantity)});
  let topWaste='';let max=0;for(const[k,v]of Object.entries(wasteTypes))if(v>max){max=v;topWaste=k}
  document.getElementById('sum-stats').innerHTML=`
    <div class="stat-card income"><div class="stat-icon">📥</div><div class="stat-label">总收入</div><div class="stat-val">¥${total}</div></div>
    <div class="stat-card expense"><div class="stat-icon">📤</div><div class="stat-label">总支出</div><div class="stat-val">¥${mExp}</div></div>
    <div class="stat-card full"><div class="waste-emoji">💰</div><div class="waste-info"><div class="stat-label">废品收入</div><div class="stat-val">¥${wInc}</div><div class="stat-sub" style="font-size:13px">工资 ¥${sInc} · 结余 ¥${bal}</div></div></div>`;
  document.getElementById('insight-box').innerHTML=`
    <div class="ib-title">💡 本月小结</div>
    <div class="ib-text">共捡废品 <b>${waste?.length||0}</b> 次${topWaste?`，捡最多的是<b>${topWaste}</b>`:''}。卖废品收入 <b>¥${wInc}</b>，${bal>=0?'攒下了':'超支了'}<b>¥${Math.abs(bal)}</b>。</div>`;
  let details='';
  salary?.forEach(s=>details+=`<div class="r-item"><div class="r-icon salary">💼</div><div class="r-info"><div class="r-title">工资收入</div><div class="r-desc">${s.month}</div></div><div class="r-amount green">+¥${s.amount}</div></div>`);
  sales?.forEach(s=>details+=`<div class="r-item"><div class="r-icon sell">💰</div><div class="r-info"><div class="r-title">卖废品</div><div class="r-desc">${new Date(s.created_at).toLocaleDateString('zh-CN')} ${s.notes||''}</div></div><div class="r-amount orange">+¥${s.total_amount}</div></div>`);
  exps?.forEach(e=>details+=`<div class="r-item"><div class="r-icon expense">💸</div><div class="r-info"><div class="r-title">${e.category}</div><div class="r-desc">${new Date(e.created_at).toLocaleDateString('zh-CN')} ${e.notes||''}</div></div><div class="r-amount red">-¥${e.amount}</div></div>`);
  document.getElementById('sum-details').innerHTML=details||'<div class="empty-state"><span class="es-icon">📭</span><div class="es-text">本月暂无记录</div></div>'
}

// Init
loadHome();
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
